apiVersion: apps/v1
kind: Deployment
metadata: { name: dockeraudit, labels: { app: dockeraudit } }
spec:
  replicas: 1
  selector: { matchLabels: { app: dockeraudit } }
  template:
    metadata: { labels: { app: dockeraudit } }
    spec:
      containers:
        - name: dockeraudit
          image: ghcr.io/cognis-digital/dockeraudit:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: dockeraudit }
spec:
  selector: { app: dockeraudit }
  ports: [{ port: 80, targetPort: 8000 }]
